name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build archive
        if: steps.check.outputs.exists == 'false'
        run: |
          ARCHIVE_NAME="superfluid-skill-v${{ steps.version.outputs.version }}.zip"
          git archive --format=zip -o "$ARCHIVE_NAME" HEAD -- .claude-plugin skills/superfluid
          echo "archive_name=$ARCHIVE_NAME" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            "${{ env.archive_name }}" \
            --target "$GITHUB_SHA" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to ClawHub
        if: steps.check.outputs.exists == 'false' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          npx clawhub@0.7 login --token "$CLAWHUB_AUTH" --no-browser
          npx clawhub@0.7 publish ./skills/superfluid \
            --slug superfluid \
            --name "Superfluid Protocol" \
            --version "${{ steps.version.outputs.version }}" \
            --tags "blockchain,defi,superfluid,web3,ethereum,solidity" \
            --changelog "Release v${{ steps.version.outputs.version }}"
        env:
          CLAWHUB_AUTH: ${{ secrets.CLAWHUB_AUTH }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
